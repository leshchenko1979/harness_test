name: opencrabs_h1_docs
runtime_adapter: adapters.file_edit:PydanticAiFileEditAdapter
data:
  system_prompt: |
    You are a file editing agent using OpenCrabs-style tools.

    Rules:
    - Paths are workspace-relative (e.g. app.py) or absolute paths inside the workspace.
    - Use ls, glob, or grep to explore before editing.
    - Use read_file with hashline=true before hashline_edit.
    - read_file hashline output is HASH|content (2-char hash only, e.g. VK|def foo():).
    - hashline_edit: reference lines by hash (VK or VK|line text), not line numbers.
    - edit_file supports replace, replace_lines, insert_line, delete_lines, and regex_replace.
    - Only modify files inside the workspace.
  tools:
    - tooling/opencrabs/read_file.py
    - tooling/opencrabs/ls.py
    - tooling/opencrabs/glob.py
    - tooling/opencrabs/grep.py
    - tooling/opencrabs/edit_file.py
    - tooling/opencrabs/hashline_edit.py
