name: LLM Agent Evals

# Temporarily disabled — re-enable push/PR when CI is fixed.
on:
  workflow_dispatch:

jobs:
  run-evals:
    runs-on: ubuntu-latest
    concurrency:
      group: evals-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Pydantic Evals Matrix
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: python -m harness.matrix run --suite experiments/suites/ci.yaml

      - name: Upload Eval Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report-${{ github.sha }}
          path: reports/*.json
          retention-days: 90
